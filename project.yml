name: FitnessPro

options:
  bundleIdPrefix: com.ajaygirolkar
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO

targets:
  FitnessPro:
    type: application
    platform: iOS
    sources:
      - App
      - Core
      - Features
      - path: Resources
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ajaygirolkar.fitnesspro
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"

  FitnessProTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/UnitTests
    dependencies:
      - target: FitnessPro
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ajaygirolkar.fitnesspro.tests
        GENERATE_INFOPLIST_FILE: YES

  FitnessProUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/UITests
    dependencies:
      - target: FitnessPro
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ajaygirolkar.fitnesspro.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  FitnessPro:
    build:
      targets:
        FitnessPro: all
        FitnessProTests: [test]
        FitnessProUITests: [test]
    test:
      targets:
        - FitnessProTests
        - FitnessProUITests
